document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ear infinite;\"><\u002Fdiv>\n    <div style=\"position: absolute; left: -120px; bottom: -160px; width: 340px; height: 340px; border-radius: 50%; border: 2px dotted rgba(255,79,163,.25); pointer-events: none;\"><\u002Fdiv>\n    <div style=\"position: relative; z-index: 2; display: flex; flex-direction: column; gap: 26px; max-width: 780px;\">\n      <h1 style=\"margin: 0; font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: clamp(52px, 8vw, 104px); line-height: .94; letter-spacing: -.02em; text-transform: uppercase; animation: fadeUp .6s ease both;\">Who's at<br>the <span style=\"color: #ff4fa3;\">party?<\u002Fspan><br><span style=\"color: #d8ff4f;\">Ask your agent.<\u002Fspan><\u002Fh1>\n      <sc-if value=\"{{ stickers }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display: flex; gap: 14px; flex-wrap: wrap; font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; animation: fadeUp .6s ease .1s both;\">\n          <span style=\"background: #ff4fa3; color: #1b0630; padding: 7px 16px; border-radius: 999px; font-weight: 500; white-space: nowrap; animation: bob 3.4s ease-in-out infinite;\">66 RSVP'D ✶<\u002Fspan>\n          <span style=\"background: #d8ff4f; color: #1b0630; padding: 7px 16px; border-radius: 999px; font-weight: 500; white-space: nowrap; animation: bob2 3.8s ease-in-out .4s infinite;\">3 MUTUALS GOING<\u002Fspan>\n          <span style=\"border: 1.5px solid #fdf6ff; padding: 7px 16px; border-radius: 999px; white-space: nowrap; transform: rotate(-1deg);\">ROOM OPEN IN THE MISSION<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <p style=\"margin: 0; font-size: 18px; line-height: 1.6; color: #b79ecf; max-width: 52ch; animation: fadeUp .6s ease .18s both; text-wrap: pretty;\">Sonar teaches your agent — Claude Code, Codex, anything that reads a <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 15px; color: #fdf6ff;\">SKILL.md<\u002Fspan> — to pull guest lists off Luma &amp; Partiful and rank housing off DirectorySF. One plain-language ask, one clean CSV. Then ask the group chat too.<\u002Fp>\n      <div style=\"display: flex; align-items: center; gap: 18px; flex-wrap: wrap; animation: fadeUp .6s ease .26s both;\">\n        <a href=\"#install\" style=\"background: #d8ff4f; color: #1b0630; padding: 13px 20px; border-radius: 999px; font-family: 'IBM Plex Mono', monospace; font-size: 14px; font-weight: 700; box-shadow: 5px 5px 0 #ff4fa3; white-space: nowrap; animation: bob2 3.8s ease-in-out .4s infinite;\" style-hover=\"background: #ff4fa3; color: #1b0630; text-decoration: none;\">INSTALL ↓<\u002Fa>\n        <a href=\"#skills\" style=\"font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: #b79ecf;\" style-hover=\"color: #d8ff4f; text-decoration: none;\">see the skills ↓<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <div style=\"animation: fadeUp .6s ease .34s both;\">\n  <div data-screen-label=\"Ticker\" style=\"background: #d8ff4f; transform: rotate(-1deg) scale(1.02); overflow: hidden; padding: 12px 0; position: relative; z-index: 3;\">\n    <div style=\"display: flex; gap: 56px; width: max-content; animation: tick {{ tickerDur }} linear infinite; font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 15px; color: #1b0630; white-space: nowrap; text-transform: uppercase;\">\n      <span>✶ 42 of 66 guests had visible profiles<\u002Fspan><span>✶ 3 mutuals going tonight<\u002Fspan><span>✶ room open near the Mission<\u002Fspan><span>✶ ranked shortlist: 7 matches, evidence attached<\u002Fspan><span>✶ ping sent → echo received<\u002Fspan><span>✶ 42 of 66 guests had visible profiles<\u002Fspan><span>✶ 3 mutuals going tonight<\u002Fspan><span>✶ room open near the Mission<\u002Fspan><span>✶ ranked shortlist: 7 matches, evidence attached<\u002Fspan><span>✶ ping sent → echo received<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n  <section data-screen-label=\"How it works\" style=\"max-width: 1240px; margin: 0 auto; padding: clamp(64px, 10vh, 112px) clamp(20px, 5vw, 64px) clamp(40px, 6vh, 72px);\">\n    <h2 style=\"margin: 0 0 40px; font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: clamp(34px, 4.4vw, 56px); text-transform: uppercase; letter-spacing: -.01em;\">Ping <span style=\"color: #ff4fa3;\">→<\u002Fspan> Echo <span style=\"color: #ff4fa3;\">→<\u002Fspan> Picture<\u002Fh2>\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 24px;\">\n      <div style=\"background: #ff4fa3; color: #1b0630; border-radius: 16px; padding: 28px; transform: rotate(-1.2deg); display: flex; flex-direction: column; gap: 12px;\">\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 500;\">01 / PING<\u002Fdiv>\n        <div style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 24px;\">Ask in one sentence<\u002Fdiv>\n        <p style=\"margin: 0; line-height: 1.55; font-size: 15px; text-wrap: pretty;\">\"Who's at this Partiful?\" \"Who's looking for a room near the Mission, fine with five housemates?\"<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background: #fdf6ff; color: #1b0630; border-radius: 16px; padding: 28px; transform: rotate(.8deg); display: flex; flex-direction: column; gap: 12px;\">\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 500;\">02 / ECHO<\u002Fdiv>\n        <div style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 24px;\">Your agent does the scrolling<\u002Fdiv>\n        <p style=\"margin: 0; line-height: 1.55; font-size: 15px; text-wrap: pretty;\">It runs the browser and bounces your ask off Luma, Partiful &amp; DirectorySF — seeing exactly what your signed-in account can see.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background: #d8ff4f; color: #1b0630; border-radius: 16px; padding: 28px; transform: rotate(-.6deg); display: flex; flex-direction: column; gap: 12px;\">\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 500;\">03 / PICTURE<\u002Fdiv>\n        <div style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 24px;\">A picture comes back<\u002Fdiv>\n        <p style=\"margin: 0; line-height: 1.55; font-size: 15px; text-wrap: pretty;\">A clean CSV or ranked shortlist lands in your workspace, evidence attached — plus an honest account of coverage. You decide.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"skills\" data-screen-label=\"Skills\" style=\"max-width: 1240px; margin: 0 auto; padding: clamp(40px, 6vh, 72px) clamp(20px, 5vw, 64px) clamp(64px, 10vh, 112px); position: relative;\">\n    <div style=\"position: absolute; right: -140px; top: 0; width: 300px; height: 300px; border-radius: 50%; border: 2px dashed rgba(216,255,79,.2); pointer-events: none;\"><\u002Fdiv>\n    <div style=\"display: flex; align-items: baseline; gap: 18px; margin-bottom: 36px; flex-wrap: wrap;\">\n      <h2 style=\"margin: 0; font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: clamp(34px, 4.4vw, 56px); text-transform: uppercase; letter-spacing: -.01em;\">The lineup<\u002Fh2>\n      <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: #b79ecf;\">3 skills on the bill, more echoes coming<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px;\">\n      <div style=\"background: #fdf6ff; color: #1b0630; border-radius: 16px; padding: 28px; box-shadow: 6px 6px 0 #ff4fa3; display: flex; flex-direction: column; gap: 14px;\" style-hover=\"transform: translateY(-4px) rotate(-1deg); transition: transform .2s ease;\">\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 15px; font-weight: 500; background: #1b0630; color: #d8ff4f; align-self: flex-start; padding: 5px 12px; border-radius: 6px;\">sonar:luma<\u002Fdiv>\n        <p style=\"margin: 0; line-height: 1.55; font-size: 15px; flex: 1; text-wrap: pretty;\">Pull a Luma event's visible guest roster into a clean CSV — names plus LinkedIn, X, and other socials — so you can decide whether tonight is worth leaving the house.<\u002Fp>\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 500; color: #ff4fa3;\">→ guests.csv<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background: #fdf6ff; color: #1b0630; border-radius: 16px; padding: 28px; box-shadow: 6px 6px 0 #d8ff4f; display: flex; flex-direction: column; gap: 14px;\" style-hover=\"transform: translateY(-4px) rotate(1deg); transition: transform .2s ease;\">\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 15px; font-weight: 500; background: #1b0630; color: #d8ff4f; align-self: flex-start; padding: 5px 12px; border-radius: 6px;\">sonar:partiful<\u002Fdiv>\n        <p style=\"margin: 0; line-height: 1.55; font-size: 15px; flex: 1; text-wrap: pretty;\">Extract a Partiful event's visible guest roster — every RSVP tab, Going to Maybe — into the same tidy CSV of names and socials.<\u002Fp>\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 500; color: #ff4fa3;\">→ guests.csv<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background: #fdf6ff; color: #1b0630; border-radius: 16px; padding: 28px; box-shadow: 6px 6px 0 #ff4fa3; display: flex; flex-direction: column; gap: 14px;\" style-hover=\"transform: translateY(-4px) rotate(-1deg); transition: transform .2s ease;\">\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 15px; font-weight: 500; background: #1b0630; color: #d8ff4f; align-self: flex-start; padding: 5px 12px; border-radius: 6px;\">sonar:directorysf<\u002Fdiv>\n        <p style=\"margin: 0; line-height: 1.55; font-size: 15px; flex: 1; text-wrap: pretty;\">Search DirectorySF housing searchers and spaces in plain language, and get a ranked shortlist with evidence — not vibes.<\u002Fp>\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 500; color: #ff4fa3;\">→ shortlist, ranked<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"install\" data-screen-label=\"Install\" style=\"background: #12021f; border-top: 3px solid #ff4fa3; border-bottom: 3px solid #ff4fa3;\">\n    <div style=\"max-width: 1240px; margin: 0 auto; padding: clamp(64px, 10vh, 112px) clamp(20px, 5vw, 64px);\">\n      <h2 style=\"margin: 0 0 36px; font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: clamp(34px, 4.4vw, 56px); text-transform: uppercase; letter-spacing: -.01em;\">Get on <span style=\"color: #d8ff4f;\">the list<\u002Fspan><\u002Fh2>\n      <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 24px;\">\n        <div style=\"background: #1b0630; border: 1.5px solid rgba(216,255,79,.4); border-radius: 14px; overflow: hidden;\">\n          <div style=\"display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; background: rgba(216,255,79,.08); border-bottom: 1.5px solid rgba(216,255,79,.25);\">\n            <span style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 15px; color: #d8ff4f;\">CLAUDE CODE<\u002Fspan>\n            <button sc-camel-on-click=\"{{ copyClaude }}\" style=\"background: #d8ff4f; border: none; border-radius: 999px; cursor: pointer; color: #1b0630; font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 500; padding: 5px 12px;\" style-hover=\"background: #ff4fa3;\">{{ claudeCopyLabel }}<\u002Fbutton>\n          <\u002Fdiv>\n          <pre style=\"margin: 0; padding: 22px; font-family: 'IBM Plex Mono', monospace; font-size: 13px; line-height: 1.8; color: #b79ecf; overflow-x: auto;\">/plugin marketplace add CyrusNuevoDia/sonar-party\n/plugin install sonar@sonar-party<\u002Fpre>\n        <\u002Fdiv>\n        <div style=\"background: #1b0630; border: 1.5px solid rgba(255,79,163,.4); border-radius: 14px; overflow: hidden;\">\n          <div style=\"display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; background: rgba(255,79,163,.08); border-bottom: 1.5px solid rgba(255,79,163,.25);\">\n            <span style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 15px; color: #ff4fa3;\">CODEX<\u002Fspan>\n            <button sc-camel-on-click=\"{{ copyCodex }}\" style=\"background: #ff4fa3; border: none; border-radius: 999px; cursor: pointer; color: #1b0630; font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 500; padding: 5px 12px;\" style-hover=\"background: #d8ff4f;\">{{ codexCopyLabel }}<\u002Fbutton>\n          <\u002Fdiv>\n          <pre style=\"margin: 0; padding: 22px; font-family: 'IBM Plex Mono', monospace; font-size: 13px; line-height: 1.8; color: #b79ecf; overflow-x: auto;\">codex plugin marketplace add CyrusNuevoDia/sonar-party\ncodex plugin add sonar@sonar-party<\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"margin: 26px 0 0; font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: #b79ecf; line-height: 1.7; max-width: 80ch; text-wrap: pretty;\">Anything else: point your agent at <span style=\"color: #fdf6ff;\">skills/<\u002Fspan> — each one is self-contained. First run needs your real accounts (Luma, Partiful phone sign-in, a DirectorySF invite); your agent walks you through signing in inside its browser. It never asks for your credentials.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer data-screen-label=\"Footer\" style=\"background: #ff4fa3; color: #1b0630; transform: rotate(0deg);\">\n    <div style=\"max-width: 1240px; margin: 0 auto; padding: clamp(56px, 8vh, 88px) clamp(20px, 5vw, 64px); display: flex; flex-direction: column; gap: 30px;\">\n      <div style=\"display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap; font-family: 'IBM Plex Mono', monospace; font-size: 13px;\">\n        <div style=\"display: flex; gap: 24px;\">\n          <a href=\"https://github.com/CyrusNuevoDia/sonar-party\" target=\"_blank\" style=\"color: #1b0630; font-weight: 500; text-decoration: underline; white-space: nowrap;\" style-hover=\"color: #fdf6ff;\">github ↗<\u002Fa>\n          <a href=\"https://github.com/CyrusNuevoDia/sonar-party/blob/main/docs/purpose.md\" target=\"_blank\" style=\"color: #1b0630; font-weight: 500; text-decoration: underline;\" style-hover=\"color: #fdf6ff;\">purpose<\u002Fa>\n          <a href=\"https://github.com/CyrusNuevoDia/sonar-party/blob/main/docs/audience.md\" target=\"_blank\" style=\"color: #1b0630; font-weight: 500; text-decoration: underline;\" style-hover=\"color: #fdf6ff;\">audience<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"font-weight: 500;\">ask the group chat • and your agent<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;stickers&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Hero&quot;},&quot;tickerSeconds&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:60,&quot;min&quot;:10,&quot;max&quot;:60,&quot;step&quot;:2,&quot;unit&quot;:&quot;s&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Ticker&quot;}}\">\nclass Component extends DCLogic {\n  state = { copied: null };\n  copy(key, text) {\n    navigator.clipboard.writeText(text).catch(() => {});\n    this.setState({ copied: key });\n    clearTimeout(this._t);\n    this._t = setTimeout(() => this.setState({ copied: null }), 1600);\n  }\n  renderVals() {\n    const c = this.state.copied;\n    return {\n      stickers: this.props.stickers ?? true,\n      tickerDur: (this.props.tickerSeconds ?? 26) + 's',\n      copyClaude: () => this.copy('claude', '/plugin marketplace add CyrusNuevoDia/sonar-party\\n/plugin install sonar@sonar-party'),\n      copyCodex: () => this.copy('codex', 'codex plugin marketplace add CyrusNuevoDia/sonar-party\\ncodex plugin add sonar@sonar-party'),\n      claudeCopyLabel: c === 'claude' ? 'copied!' : 'copy',\n      codexCopyLabel: c === 'codex' ? 'copied!' : 'copy',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
